name: Create Incremental Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "next_version=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release
        run: |
          gh release create ${{ steps.version.outputs.next_version }} \
            --title "Catch the Chaos ${{ steps.version.outputs.next_version }}" \
            --notes "## Catch the Chaos ${{ steps.version.outputs.next_version }} - Release

Latest changes pushed to main branch.

### Assets Included
- \`index.html\` - Main game

Commit: ${{ github.sha }}" \
            --target main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
