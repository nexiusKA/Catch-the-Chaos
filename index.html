<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catch the Chaos!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0a0a1a;
      font-family: 'Arial Black', Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* ── Star field ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .stars span {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
      opacity: 0.4;
    }
    @keyframes twinkle {
      to { opacity: 0.05; }
    }

    /* ── Main panel ── */
    .panel {
      position: relative;
      z-index: 1;
      width: min(460px, calc(100vw - 28px));
      background: rgba(10, 10, 30, 0.92);
      border: 3px solid #ff6600;
      border-radius: 14px;
      padding: 36px 32px 30px;
      text-align: center;
      box-shadow:
        0 0 40px rgba(255, 102, 0, 0.45),
        0 0 90px rgba(255, 102, 0, 0.18);
    }

    /* ── Title ── */
    h1 {
      font-size: clamp(2rem, 8vw, 2.8rem);
      line-height: 1.15;
      margin-bottom: 6px;
      background: linear-gradient(180deg, #FFD700 0%, #FF6600 50%, #FF0066 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 10px rgba(255, 102, 0, 0.7));
    }

    .tagline {
      color: #aaffaa;
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 28px;
      font-family: Arial, sans-serif;
      font-size: 0.82rem;
      color: #ccc;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Buttons ── */
    .btn-play {
      display: block;
      text-decoration: none;
      color: #fff;
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: 1.15rem;
      letter-spacing: 0.05em;
      background: rgba(255, 102, 0, 0.2);
      border: 3px solid #ff6600;
      border-radius: 10px;
      padding: 14px 20px;
      margin-bottom: 12px;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 0 18px rgba(255, 102, 0, 0.35);
      animation: pulse-btn 2.2s ease-in-out infinite;
    }
    .btn-play:hover {
      background: rgba(255, 102, 0, 0.42);
      transform: scale(1.03);
    }
    @keyframes pulse-btn {
      0%, 100% { box-shadow: 0 0 18px rgba(255, 102, 0, 0.35); }
      50%       { box-shadow: 0 0 32px rgba(255, 102, 0, 0.7); }
    }

    .btn-secondary {
      display: block;
      text-decoration: none;
      color: #aaa;
      font-family: Arial, sans-serif;
      font-size: 0.88rem;
      border: 1px solid rgba(255, 102, 0, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-secondary:hover {
      border-color: #ff6600;
      color: #ff9944;
    }

    /* ── Controls hint ── */
    .controls {
      margin-top: 18px;
      font-family: Arial, sans-serif;
      font-size: 0.8rem;
      color: #FFD700;
    }

    /* ── Version badge ── */
    .version {
      margin-top: 10px;
      font-family: Arial, sans-serif;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>

  <!-- Star field -->
  <div class="stars" id="stars"></div>

  <main class="panel">
    <h1>CATCH THE<br>CHAOS! 💨</h1>
    <p class="tagline">Catch the blobs · Dodge the spikes!</p>

    <div class="legend">
      <span class="legend-item"><span class="dot" style="background:#7FFF00;box-shadow:0 0 6px #7FFF00"></span>Catch</span>
      <span class="legend-item"><span class="dot" style="background:#FF2222;box-shadow:0 0 6px #FF2222"></span>Avoid</span>
      <span class="legend-item"><span class="dot" style="background:#FFD700;box-shadow:0 0 6px #FFD700"></span>Power-up</span>
    </div>

    <a href="./game.html" class="btn-play">▶ &nbsp;PLAY NOW</a>
    <a href="https://github.com/nexiusKA/Catch-the-Chaos" class="btn-secondary" target="_blank" rel="noopener noreferrer">GitHub Repository ↗</a>

    <p class="controls">← / → or A / D to move &nbsp;|&nbsp; ◀ ▶ on mobile</p>
    <p class="version" id="app-version"></p>
  </main>

  <script>
    // Set version text only when placeholder has been replaced by the build
    (function() {
      var v = "v__APP_VERSION__";
      if (v.indexOf("__") === -1) {
        document.getElementById("app-version").textContent = v;
      }
    })();

    // Generate random stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('span');
      const size = Math.random() * 2.5 + 0.5;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random() * 100}%;
        left:${Math.random() * 100}%;
        --d:${(Math.random() * 3 + 1.5).toFixed(1)}s;
        animation-delay:${(Math.random() * 3).toFixed(1)}s;
      `;
      container.appendChild(s);
    }
  </script>
</body>
</html>
